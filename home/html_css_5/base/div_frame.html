<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Рамка</title>
</head>
<body>
    <div style="background-image: url(img/ramka_h.png);
        background-position: top;
        background-repeat: repeat-x;">
        <div style="background-image: url(img/ramka_v.png);
            background-position: right;
            background-repeat: repeat-y;">
            <div style="background-image: url(img/ramka_h.png);
                background-position: bottom;
                background-repeat: repeat-x;">
                <div style="background-image: url(img/ramka_v.png);
                    background-position: left;
                    background-repeat: repeat-y;">
                    <div style="background-image: url(img/ramka_1.png);
                        background-position: left top;
                        background-repeat: no-repeat;">
                        <div style="background-image: url(img/ramka_2.png);
                                background-position: right top;
                                background-repeat: no-repeat;">
                            <div style="background-image: url(img/ramka_3.png);
                                background-position: right bottom;
                                background-repeat: no-repeat;">
                                <div style="background-image: url(img/ramka_4.png);
                                    background-position: left bottom;
                                    background-repeat: no-repeat;">
                                    <div style="padding: 50px; font-size: 30px; text-align: center;">
                                        Бериллий — элемент главной подгруппы второй группы, второго периода периодической 
                                        системы химических элементов Д. И. Менделеева, с атомным номером 4. Обозначается 
                                        символом Be (лат. Beryllium). Высокотоксичный элемент. Простое вещество бериллий 
                                        — относительно твёрдый металл светло-серого цвета.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
