<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check</title>

    <style>
        input {
            display: none;
        }

        label {
            width: 50px;
            height: 50px;
            background-image: url(check.gif);
            background-size: 200%;
            display: block;
        }

        input:checked + label {
            background-position: -50px;
        }

    </style>


</head>
<body>

    <input type="checkbox" id="check">
    <label for="check"></label>

</body>
</html>
